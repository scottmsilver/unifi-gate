        function ActivityLog() {
            const [events, setEvents] = useState([]);
            const [loading, setLoading] = useState(true);
            const [expanded, setExpanded] = useState(false);

            useEffect(() => {
                const fetchEvents = async () => {
                    try {
                        const res = await authFetch('/events?limit=50');
                        const data = await res.json();
                        if (Array.isArray(data)) {
                            setEvents(data);
                        } else {
                            console.error('Events response not an array:', data);
                            setEvents([]);
                        }
                    } catch (err) {
                        console.error('Failed to fetch events:', err);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchEvents();
            }, []);

            const formatTime = (timestamp) => {
                const date = new Date(timestamp);
                const now = new Date();
                const isToday = date.toDateString() === now.toDateString();
                if (isToday) {
                    return date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
                }
                return date.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' +
                       date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            };

            // Event type to label mapping
            const EVENT_LABELS = {
                unlock: 'Opened once',
                hold_today: 'Held open',
                hold_forever: 'Held open forever',
                stop_hold: 'Released hold',
                login_success: 'Logged in',
                orphan_cleanup: 'Auto cleanup',
                sync: 'Sync',
                ws_unlock: 'Unlocked',
                ws_lock: 'Locked',
                ws_rex: 'REX pressed',
                ws_door_position: 'Door moved',
                ws_entry: 'Entry',
                ws_exit: 'Exit'
            };

            // Event type to icon mapping (uses LockIcon for lock-related events)
            const EventIcon = ({ event }) => {
                const className = "w-4 h-4 text-gray-400";

                // Use reusable LockIcon for lock-related events
                if (event === 'unlock' || event === 'ws_unlock') {
                    return <LockIcon locked={false} className={className} />;
                }
                if (event === 'stop_hold' || event === 'ws_lock') {
                    return <LockIcon locked={true} className={className} />;
                }
                if (event === 'hold_today') {
                    return <ClockIcon className={className} />;
                }

                // Other icons with unique paths
                const iconPaths = {
                    hold_forever: "M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15",
                    login_success: "M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z",
                    orphan_cleanup: "M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16",
                    sync: "M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15",
                    ws_rex: "M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122",
                    ws_door_position: "M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6",
                    ws_entry: "M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1",
                    ws_exit: "M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
                };

                const path = iconPaths[event];
                if (path) {
                    return (
                        <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={path} />
                        </svg>
                    );
                }

                // Default dot icon
                return <svg className={className} fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" /></svg>;
            };

            const getEventLabel = (event) => EVENT_LABELS[event] || event;

            const displayEvents = expanded ? events : events.slice(0, 5);

            return (
                <div className={STYLES.cardWithPadding}>
                    <h2 className="text-lg font-bold text-gray-900 mb-4">Activity Log</h2>

                    {loading ? (
                        <LoadingSpinner />
                    ) : events.length === 0 ? (
                        <p className="text-gray-500 text-sm text-center py-4">No activity yet</p>
                    ) : (
                        <div className="space-y-2">
                            {displayEvents.map((evt, idx) => (
                                <div key={idx} className="flex items-start gap-3 py-2 border-b border-gray-50 last:border-0">
                                    <div className="mt-0.5"><EventIcon event={evt.event} /></div>
                                    <div className="flex-1 min-w-0">
                                        <div className="flex justify-between items-baseline">
                                            <span className="font-medium text-gray-900 text-sm">
                                                {getEventLabel(evt.event)}
                                                {evt.details && <span className="text-gray-500 font-normal"> {evt.details}</span>}
                                            </span>
                                            <span className="text-xs text-gray-400 ml-2 whitespace-nowrap">{formatTime(evt.timestamp)}</span>
                                        </div>
                                        <div className="text-xs text-gray-500 truncate">
                                            {evt.device_name || evt.device_id || ''}{evt.device_name && evt.user && evt.user !== 'system' ? ' · ' : ''}{evt.user !== 'system' ? evt.user : ''}
                                        </div>
                                    </div>
                                </div>
                            ))}

                            {events.length > 5 && (
                                <button
                                    onClick={() => setExpanded(!expanded)}
                                    className="w-full text-center text-xs text-blue-600 hover:text-blue-800 py-2"
                                >
                                    {expanded ? 'Show less' : `Show ${events.length - 5} more`}
                                </button>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        // =========== User Management (Admin Only) ===========
        function UserManagement() {
            const [users, setUsers] = useState([]);
            const [invites, setInvites] = useState([]);
            const [loading, setLoading] = useState(true);
            const [inviteEmail, setInviteEmail] = useState('');
            const [autoApprove, setAutoApprove] = useState(true);
            const [addMode, setAddMode] = useState('direct'); // 'direct' or 'invite'
            const [inviteStatus, setInviteStatus] = useState('');
            const [inviteUrl, setInviteUrl] = useState('');

            const fetchUsers = async () => {
                try {
                    const res = await authFetch('/admin/users');
                    if (res.ok) {
                        const data = await res.json();
                        setUsers(data.users || []);
                    }
                } catch (err) {
                    console.error('Failed to fetch users:', err);
                }
            };

            const fetchInvites = async () => {
                try {
                    const res = await authFetch('/admin/invites');
                    if (res.ok) {
                        const data = await res.json();
                        setInvites(data.invites || []);
                    }
                } catch (err) {
                    console.error('Failed to fetch invites:', err);
                }
            };

            useEffect(() => {
                const load = async () => {
                    await Promise.all([fetchUsers(), fetchInvites()]);
                    setLoading(false);
                };
                load();
            }, []);

            const handleAddUser = async (e) => {
                e.preventDefault();
                setInviteStatus(addMode === 'direct' ? 'Adding...' : 'Sending...');
                setInviteUrl('');

                try {
                    const endpoint = addMode === 'direct' ? '/admin/users/add' : '/admin/invite';
                    const body = addMode === 'direct'
                        ? { email: inviteEmail }
                        : { email: inviteEmail, auto_approve: autoApprove };

                    const res = await authFetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    const data = await res.json();

                    if (res.ok) {
                        setInviteStatus(data.message || 'Success!');
                        if (data.invite_url) {
                            setInviteUrl(data.invite_url);
                        }
                        setInviteEmail('');
                        if (addMode === 'direct') {
                            fetchUsers();
                        } else {
                            fetchInvites();
                        }
                    } else {
                        setInviteStatus('Error: ' + (data.error || 'Failed'));
                    }
                } catch (err) {
                    setInviteStatus('Network error');
                }
            };

            const handleApprove = async (email) => {
                try {
                    const res = await authFetch(`/admin/users/${encodeURIComponent(email)}/approve`, {
                        method: 'POST'
                    });
                    if (res.ok) {
                        fetchUsers();
                    }
                } catch (err) {
                    console.error('Failed to approve user:', err);
                }
            };

            const handleApproveInvite = async (token) => {
                try {
                    const res = await authFetch(`/admin/invites/${token}/approve`, {
                        method: 'POST'
                    });
                    if (res.ok) {
                        fetchInvites();
                    }
                } catch (err) {
                    console.error('Failed to approve invite:', err);
                }
            };

            const handleReject = async (email) => {
                try {
                    const res = await authFetch(`/admin/users/${encodeURIComponent(email)}/reject`, {
                        method: 'POST'
                    });
                    if (res.ok) {
                        fetchUsers();
                    }
                } catch (err) {
                    console.error('Failed to reject user:', err);
                }
            };

            const handleChangeRole = async (email, newRole) => {
                try {
                    const res = await authFetch(`/admin/users/${encodeURIComponent(email)}/role`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ role: newRole })
                    });
                    if (res.ok) {
                        fetchUsers();
                    }
                } catch (err) {
                    console.error('Failed to change role:', err);
                }
            };

            if (loading) {
                return (
                    <div className={STYLES.cardWithPadding}>
                        <h2 className="text-lg font-bold text-gray-900 mb-4">User Management</h2>
                        <LoadingSpinner />
                    </div>
                );
            }

            return (
                <div className={`${STYLES.cardWithPadding} space-y-6`}>
                    <h2 className="text-lg font-bold text-gray-900">User Management</h2>

                    {/* Add User Form */}
                    <div className="border-b border-gray-100 pb-4">
                        <div className="flex items-center gap-4 mb-2">
                            <h3 className="text-sm font-semibold text-gray-700">Add User</h3>
                            <div className="flex text-xs">
                                <button
                                    onClick={() => setAddMode('direct')}
                                    className={`px-2 py-1 rounded-l border ${addMode === 'direct' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-300'}`}
                                >
                                    Direct
                                </button>
                                <button
                                    onClick={() => setAddMode('invite')}
                                    className={`px-2 py-1 rounded-r border-t border-r border-b ${addMode === 'invite' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-300'}`}
                                >
                                    Invite Link
                                </button>
                            </div>
                        </div>
                        <form onSubmit={handleAddUser} className="space-y-2">
                            <div className="flex gap-2">
                                <input
                                    type="email"
                                    placeholder="email@example.com"
                                    value={inviteEmail}
                                    onChange={(e) => setInviteEmail(e.target.value)}
                                    className={`flex-1 ${STYLES.inputSmall}`}
                                    required
                                />
                                <button
                                    type="submit"
                                    className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700"
                                >
                                    {addMode === 'direct' ? 'Add User' : 'Send Invite'}
                                </button>
                            </div>
                            {addMode === 'invite' && (
                                <label className="flex items-center gap-2 text-sm text-gray-600">
                                    <input
                                        type="checkbox"
                                        checked={autoApprove}
                                        onChange={(e) => setAutoApprove(e.target.checked)}
                                        className="rounded"
                                    />
                                    Auto-approve when they accept
                                </label>
                            )}
                            {addMode === 'direct' && (
                                <p className="text-xs text-gray-500">User will be approved immediately. They just need to sign in with this email.</p>
                            )}
                        </form>
                        {inviteStatus && (
                            <p className={`text-xs mt-2 ${inviteStatus.includes('Error') ? 'text-red-500' : 'text-green-600'}`}>
                                {inviteStatus}
                            </p>
                        )}
                        {inviteUrl && (
                            <div className="mt-2 p-2 bg-gray-50 rounded text-xs">
                                <span className="text-gray-500">Invite URL: </span>
                                <code className="text-blue-600 break-all">{inviteUrl}</code>
                            </div>
                        )}
                    </div>

                    {/* Pending Invites */}
                    {invites.length > 0 && (
                        <div className="border-b border-gray-100 pb-4">
                            <h3 className="text-sm font-semibold text-gray-700 mb-2">Pending Invites</h3>
                            <div className="space-y-2">
                                {invites.map((invite, idx) => (
                                    <div key={idx} className="flex justify-between items-center py-2 border-b border-gray-50 last:border-0">
                                        <div>
                                            <span className="text-sm text-gray-900">{invite.email}</span>
                                            <span className="text-xs text-gray-400 ml-2">by {invite.invited_by}</span>
                                            {invite.auto_approve && (
                                                <span className="ml-2 px-1.5 py-0.5 bg-green-100 text-green-700 text-xs rounded">pre-approved</span>
                                            )}
                                        </div>
                                        <div className="flex items-center gap-2">
                                            {!invite.auto_approve && (
                                                <button
                                                    onClick={() => handleApproveInvite(invite.token)}
                                                    className="text-xs text-green-600 hover:text-green-800"
                                                >
                                                    Pre-approve
                                                </button>
                                            )}
                                            <span className="text-xs text-gray-400">
                                                expires {new Date(invite.expires_at).toLocaleDateString()}
                                            </span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* User List */}
                    <div>
                        <h3 className="text-sm font-semibold text-gray-700 mb-2">Users ({users.length})</h3>
                        {users.length === 0 ? (
                            <p className="text-sm text-gray-500">No users yet</p>
                        ) : (
                            <div className="space-y-2">
                                {users.map((user, idx) => (
                                    <div key={idx} className="flex justify-between items-center py-2 border-b border-gray-50 last:border-0">
                                        <div className="flex items-center gap-2">
                                            <span className="text-sm text-gray-900">{user.email}</span>
                                            <RoleBadge role={user.role} />
                                            <StatusBadge status={user.status} />
                                        </div>
                                        <div className="flex gap-2">
                                            {user.status === 'pending' && (
                                                <>
                                                    <button
                                                        onClick={() => handleApprove(user.email)}
                                                        className="text-xs text-green-600 hover:text-green-800 font-medium"
                                                    >
                                                        Approve
                                                    </button>
                                                    <button
                                                        onClick={() => handleReject(user.email)}
                                                        className="text-xs text-red-600 hover:text-red-800 font-medium"
                                                    >
                                                        Reject
                                                    </button>
                                                </>
                                            )}
                                            {user.status === 'approved' && user.role !== 'admin' && (
                                                <button
                                                    onClick={() => handleChangeRole(user.email, 'admin')}
                                                    className="text-xs text-purple-600 hover:text-purple-800 font-medium"
                                                >
                                                    Make Admin
                                                </button>
                                            )}
                                            {user.status === 'approved' && user.role === 'admin' && (
                                                <button
                                                    onClick={() => handleChangeRole(user.email, 'user')}
                                                    className="text-xs text-gray-600 hover:text-gray-800 font-medium"
                                                >
                                                    Remove Admin
                                                </button>
                                            )}
                                            {user.status === 'rejected' && (
                                                <button
                                                    onClick={() => handleApprove(user.email)}
                                                    className="text-xs text-green-600 hover:text-green-800 font-medium"
                                                >
                                                    Approve
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function SetupForm({ onClose, initialConfig, isAdmin }) {

            const [activeSection, setActiveSection] = useState('connection');
            const [isEditing, setIsEditing] = useState(!(initialConfig && initialConfig.connected));
            const [form, setForm] = useState({ host: '', username: 'admin', password: '', token: '', site_name: '' });
            const [status, setStatus] = useState('');

            useEffect(() => {
                if(initialConfig) {
                    setForm(f => ({
                        ...f,
                        host: initialConfig.host || f.host,
                        username: initialConfig.username || f.username,
                        site_name: initialConfig.site_name || f.site_name
                    }));
                    setIsEditing(!(initialConfig && initialConfig.connected));
                }
            }, [initialConfig]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                const isReconnect = !!form.password;
                const hostChanged = initialConfig && form.host !== initialConfig.host;
                const userChanged = initialConfig && form.username !== initialConfig.username;

                if (!isReconnect && (hostChanged || userChanged)) {
                    setStatus('Error: Password required to change Host or Username');
                    return;
                }

                setStatus(isReconnect ? 'Connecting...' : 'Saving...');

                try {
                    const endpoint = isReconnect ? '/setup' : '/config/update';
                    const res = await authFetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(form)
                    });
                    const data = await res.json();
                    if (res.ok) {
                        setStatus('Success!');
                        setIsEditing(false);
                    } else {
                        setStatus('Error: ' + data.message);
                    }
                } catch (err) {
                    setStatus('Network Error');
                }
            };

            // Section navigation tabs
            const sections = [
                { id: 'connection', label: 'Connection' },
                ...(isAdmin ? [{ id: 'users', label: 'Users' }] : []),
                { id: 'debug', label: 'Debug' },
                { id: 'activity', label: 'Activity' },

                        <button
                            onClick={onClose}
                            className="p-2 hover:bg-gray-100 rounded-lg transition-colors"

                            <CloseIcon className="w-5 h-5 text-gray-500" />
                        </button>

                            <button
                                key={section.id}
                                onClick={() => setActiveSection(section.id)}
                                className={`flex-1 py-2 px-3 text-xs font-medium rounded-md transition-colors ${
                                    activeSection === section.id
                                        ? 'bg-white text-gray-900 shadow-sm'
                                        : 'text-gray-500 hover:text-gray-700'
                                }`}
                            >
                                {section.label}
                            </button>
                        ))}
                    </div>

                    {/* Connection Section */}
                    {activeSection === 'connection' && (
                        <div className={`${STYLES.card} p-5`}>
                            {!isEditing && initialConfig && initialConfig.connected ? (
                                <div className="space-y-4">
                                    <div className="space-y-2 text-sm">
                                        <div className="flex justify-between py-2 border-b border-gray-100">
                                            <span className="text-gray-500">Status</span>
                                            <span className="text-green-600 font-semibold flex items-center gap-1">
                                                <span className="h-2 w-2 rounded-full bg-green-500"></span> Connected
                                            </span>
                                        </div>
                                        <div className="flex justify-between py-2 border-b border-gray-100">
                                            <span className="text-gray-500">Site Name</span>
                                            <span className="text-gray-900 font-medium">{initialConfig.site_name || 'Default'}</span>
                                        </div>
                                        <div className="flex justify-between py-2 border-b border-gray-100">
                                            <span className="text-gray-500">Controller</span>
                                            <span className="text-gray-900 font-mono text-xs">{initialConfig.host}</span>
                                        </div>
                                        <div className="flex justify-between py-2">
                                            <span className="text-gray-500">Username</span>
                                            <span className="text-gray-900 font-medium">{initialConfig.username}</span>
                                        </div>
                                    </div>
                                    <button
                                        onClick={() => setIsEditing(true)}
                                        className={`w-full ${STYLES.btnSecondary}`}>
                                        Edit Connection
                                    </button>
                                    <button
                                        onClick={signOut}
                                        className={`w-full ${STYLES.btnDanger} text-xs py-2`}>
                                        Sign Out
                                    </button>
                                </div>
                            ) : (
                                <form onSubmit={handleSubmit} className="space-y-3">
                                    {initialConfig && initialConfig.connected && (
                                        <div className="flex justify-end">
                                            <button type="button" onClick={() => setIsEditing(false)} className="text-gray-400 text-xs hover:text-gray-600">Cancel</button>
                                        </div>
                                    )}
                                    <div>
                                        <label className={STYLES.label}>Site Name</label>
                                        <input type="text" placeholder="e.g. Home" className={STYLES.input} value={form.site_name} onChange={e => setForm({...form, site_name: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className={STYLES.label}>Controller Host</label>
                                        <input required type="text" placeholder="192.168.1.1" className={STYLES.input} value={form.host} onChange={e => setForm({...form, host: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className={STYLES.label}>Username</label>
                                        <input required type="text" placeholder="admin" className={STYLES.input} value={form.username} onChange={e => setForm({...form, username: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className={STYLES.label}>Password</label>
                                        <input type="password" placeholder={initialConfig && initialConfig.connected ? "(Unchanged)" : "Password"} className={STYLES.input} value={form.password} onChange={e => setForm({...form, password: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className={STYLES.label}>2FA Code (Optional)</label>
                                        <input type="text" placeholder="123456" className={STYLES.input} value={form.token} onChange={e => setForm({...form, token: e.target.value})} />
                                    </div>
                                    <button type="submit" className={`w-full ${STYLES.btnPrimary}`}>
                                        {form.password ? "Connect" : "Save"}
                                    </button>
                                    {status && <p className={`text-center text-xs mt-2 ${status.includes('Success') ? 'text-green-500' : 'text-red-500'}`}>{status}</p>}
                                </form>
                            )}
                        </div>
                    )}

                    {/* Users Section (Admin only) */}
                    {activeSection === 'users' && isAdmin && <UserManagement />}

                    {/* Debug Section */}
                    {activeSection === 'debug' && <DoorsDebugList />}

                    {/* Activity Section */}
                    {activeSection === 'activity' && <ActivityLog />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <AuthProvider>
                <App />
            </AuthProvider>
        );
    {% endraw %}
    </script>
</body>
</html>
